<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deathroll</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #2c2c2c;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 400px;
        }

        h1 { color: #e74c3c; margin-top: 0; margin-bottom: 20px; }
        
        .setup-section {
            background: #333;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        input {
            background: #444;
            border: 1px solid #555;
            color: white;
            padding: 8px;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .name-input { flex-grow: 1; }
        .val-input { width: 80px; text-align: center; }

        .status { margin-bottom: 1rem; font-size: 1.2rem; color: #bdc3c7; height: 1.5em; font-weight: bold; }

        .current-roll {
            font-size: 5rem;
            font-weight: bold;
            margin: 0.5rem 0;
            color: #f1c40f;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
        }

        .controls { display: flex; flex-direction: column; gap: 10px; }

        button {
            border: none;
            color: white;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        #rollBtn { background-color: #e74c3c; width: 100%; }
        #rollBtn:hover { background-color: #c0392b; }
        #rollBtn:disabled { background-color: #555; cursor: not-allowed; }

        #resetBtn { background-color: #34495e; width: 100%; }

        .log {
            margin-top: 1.5rem;
            max-height: 120px;
            overflow-y: auto;
            font-size: 0.85rem;
            text-align: left;
            border-top: 1px solid #444;
            padding-top: 10px;
            color: #95a5a6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Spieloplatt-Deathroll</h1>
    
    <div class="setup-section" id="setupArea">
        <div class="input-row">
            <input type="text" id="p1Name" class="name-input" placeholder="Name Spieler 1">
            <input type="text" id="p2Name" class="name-input" placeholder="Name Spieler 2">
        </div>
        <div class="input-row">
            <span>Startwert:</span>
            <input type="number" id="startInput" class="val-input" value="1000" min="2">
        </div>
    </div>

    <div id="status" class="status">Namen eingeben & starten!</div>
    <div id="display" class="current-roll">---</div>
    
    <div class="controls">
        <button id="rollBtn" onclick="playTurn()">WÜRFELN!</button>
        <button id="resetBtn" onclick="resetGame()">Neues Spiel / Reset</button>
    </div>

    <div id="log" class="log">Warte auf den ersten Wurf...</div>
</div>

<script>
    let currentMax = 0;
    let playerTurn = 1; // 1 oder 2
    let gameOver = false;
    let isFirstRoll = true;
    let names = ["Spieler 1", "Spieler 2"];

    const display = document.getElementById('display');
    const statusText = document.getElementById('status');
    const log = document.getElementById('log');
    const rollBtn = document.getElementById('rollBtn');
    const startInput = document.getElementById('startInput');
    const setupArea = document.getElementById('setupArea');
    const p1Input = document.getElementById('p1Name');
    const p2Input = document.getElementById('p2Name');

    function playTurn() {
        if (gameOver) return;

        
        if (isFirstRoll) {
            names[0] = p1Input.value.trim() || "Spieler 1";
            names[1] = p2Input.value.trim() || "Spieler 2";
            currentMax = parseInt(startInput.value) || 1000;
            
            isFirstRoll = false;
            setupArea.style.opacity = "0.4";
            p1Input.disabled = true;
            p2Input.disabled = true;
            startInput.disabled = true;
            log.innerHTML = "<b>Spiel gestartet!</b>";
        }

        const aktuellerSpielerName = names[playerTurn - 1];
        const roll = Math.floor(Math.random() * currentMax) + 1;
        
        const entry = document.createElement('div');
        entry.innerHTML = `<b>${aktuellerSpielerName}</b> würfelt <b>${roll}</b> (max ${currentMax})`;
        log.prepend(entry);

        display.textContent = roll;

        if (roll === 1) {
            statusText.textContent = `${aktuellerSpielerName} hat verloren! 💀`;
            statusText.style.color = "#e74c3c";
            display.style.color = "#e74c3c";
            gameOver = true;
            rollBtn.disabled = true;
        } else {
            currentMax = roll;
            // Wechsel zwischen 1 und 2
            playerTurn = (playerTurn === 1) ? 2 : 1;
            statusText.textContent = `${names[playerTurn - 1]} ist dran`;
            statusText.style.color = "#f1c40f";
        }
    }

    function resetGame() {
        isFirstRoll = true;
        gameOver = false;
        playerTurn = 1; 
        
        display.textContent = "---";
        display.style.color = "#f1c40f";
        statusText.textContent = "Bereit für die Revanche?";
        statusText.style.color = "#bdc3c7";
        log.innerHTML = "Neues Spiel vorbereitet.";
        
        rollBtn.disabled = false;
        p1Input.disabled = false;
        p2Input.disabled = false;
        startInput.disabled = false;
        setupArea.style.opacity = "1";
    }
</script>

</body>
</html>
