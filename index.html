
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deathroll</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #2c2c2c;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 380px;
        }

        h1 { color: #e74c3c; margin-top: 0; }
        
        .input-group {
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
        }

        input {
            background: #444;
            border: 1px solid #555;
            color: white;
            padding: 8px;
            border-radius: 5px;
            width: 80px;
            font-size: 1rem;
            text-align: center;
        }

        .status { margin-bottom: 1rem; font-size: 1.1rem; color: #bdc3c7; height: 1.2em; }

        .current-roll {
            font-size: 4.5rem;
            font-weight: bold;
            margin: 0.5rem 0;
            color: #f1c40f;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
        }

        button {
            background-color: #e74c3c;
            border: none;
            color: white;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            font-weight: bold;
        }

        button:hover { background-color: #c0392b; }
        button:disabled { background-color: #555; cursor: not-allowed; }

        .log {
            margin-top: 1.5rem;
            max-height: 120px;
            overflow-y: auto;
            font-size: 0.85rem;
            text-align: left;
            border-top: 1px solid #444;
            padding-top: 10px;
            color: #95a5a6;
        }

        .controls { display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Spieloplatt-Deathroll</h1>
    
    <div class="input-group" id="setupArea">
        <span>Startwert:</span>
        <input type="number" id="startInput" value="1000" min="2">
    </div>

    <div id="status" class="status">Bereit zum Starten!</div>
    <div id="display" class="current-roll">---</div>
    
    <div class="controls">
        <button id="rollBtn" onclick="playTurn()">WÜRFELN!</button>
        <button id="resetBtn" onclick="resetGame()" style="background-color: #34495e;">Neues Spiel</button>
    </div>

    <div id="log" class="log">Gib einen Wert ein und würfle!</div>
</div>

<script>
    let currentMax = 0;
    let playerTurn = 1;
    let gameOver = false;
    let isFirstRoll = true;

    const display = document.getElementById('display');
    const statusText = document.getElementById('status');
    const log = document.getElementById('log');
    const rollBtn = document.getElementById('rollBtn');
    const startInput = document.getElementById('startInput');
    const setupArea = document.getElementById('setupArea');

    function playTurn() {
        if (gameOver) return;

        
        if (isFirstRoll) {
            currentMax = parseInt(startInput.value) || 1000;
            isFirstRoll = false;
            setupArea.style.opacity = "0.5";
            startInput.disabled = true;
            log.innerHTML = "Spiel gestartet!";
        }

        const roll = Math.floor(Math.random() * currentMax) + 1;
        
        const entry = document.createElement('div');
        entry.textContent = `S${playerTurn} würfelt ${roll} (max ${currentMax})`;
        log.prepend(entry);

        display.textContent = roll;

        if (roll === 1) {
            statusText.textContent = `Spieler ${playerTurn} hat verloren! 💀`;
            statusText.style.color = "#e74c3c";
            display.style.color = "#e74c3c";
            gameOver = true;
            rollBtn.disabled = true;
        } else {
            currentMax = roll;
            playerTurn = playerTurn === 1 ? 2 : 1;
            statusText.textContent = `Spieler ${playerTurn} ist dran`;
        }
    }

    function resetGame() {
        isFirstRoll = true;
        gameOver = false;
        display.textContent = "---";
        display.style.color = "#f1c40f";
        statusText.textContent = "Bereit zum Starten!";
        statusText.style.color = "#bdc3c7";
        log.innerHTML = "Neues Spiel vorbereitet.";
        rollBtn.disabled = false;
        startInput.disabled = false;
        setupArea.style.opacity = "1";
    }
</script>

</body>
</html>
